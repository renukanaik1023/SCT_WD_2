<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional Stopwatch</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <div class="stopwatch-card">

            <h1>STOPWATCH</h1>

            <div id="display">
                00:00:00:00
            </div>

            <div class="buttons">

                <button id="startBtn" class="start">
                    Start
                </button>

                <button id="pauseBtn" class="pause">
                    Pause
                </button>

                <button id="resetBtn" class="reset">
                    Reset
                </button>

                <button id="lapBtn" class="lap">
                    Lap
                </button>

            </div>

            <div class="lap-container">

                <h2>Lap Times</h2>

                <ul id="laps"></ul>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
